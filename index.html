<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Window Night</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #05070d;
    cursor: crosshair;
  }
  #scene {
    position: fixed;
    inset: 0;
  }
  /* Blurred lights behind the window */
  #lights {
    position: absolute;
    inset: 0;
    overflow: hidden;
    filter: blur(14px) brightness(1.05);
  }
  .bokeh {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
    animation: sway 12s ease-in-out infinite alternate;
  }
  @keyframes sway {
    from { transform: translate(0,0); }
    to   { transform: translate(14px, 10px); }
  }
  /* City silhouette / dark gradient overlay */
  #vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0) 30%, rgba(3,5,10,0.55) 100%),
      linear-gradient(to bottom, rgba(5,8,16,0.35), rgba(2,3,8,0.6));
    pointer-events: none;
  }
  /* Fog / condensation tint */
  #fog {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(120,140,170,0.06), rgba(80,100,140,0.10));
    pointer-events: none;
  }
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #hint {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(200,215,235,0.5);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    animation: fade 6s ease-in forwards;
  }
  @keyframes fade { 0%,60% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
<div id="scene">
  <div id="lights"></div>
  <div id="fog"></div>
  <div id="vignette"></div>
  <canvas id="glass"></canvas>
</div>
<div id="hint">click &amp; drag to spray water on the glass</div>
<script>
(() => {
  "use strict";

  // ---------- Background bokeh lights ----------
  const lightsEl = document.getElementById('lights');
  const palette = [
    'rgba(255,180,90,',   // warm amber
    'rgba(120,170,255,',  // cool blue
    'rgba(255,120,130,',  // red-pink
    'rgba(140,255,200,',  // teal
    'rgba(255,225,150,',  // soft yellow
    'rgba(200,150,255,'   // violet
  ];
  function buildLights() {
    lightsEl.innerHTML = '';
    const n = 34;
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      d.className = 'bokeh';
      const size = 18 + Math.random() * 90;
      const col = palette[(Math.random() * palette.length) | 0];
      const alpha = 0.25 + Math.random() * 0.5;
      d.style.width = size + 'px';
      d.style.height = size + 'px';
      d.style.left = (Math.random() * 100) + '%';
      d.style.top = (Math.random() * 100) + '%';
      d.style.background = 'radial-gradient(circle, ' + col + alpha + ') 0%, ' + col + '0) 70%)';
      d.style.animationDuration = (8 + Math.random() * 10) + 's';
      d.style.animationDelay = (-Math.random() * 10) + 's';
      lightsEl.appendChild(d);
    }
  }
  buildLights();

  // ---------- Glass droplet canvas ----------
  const canvas = document.getElementById('glass');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => { resize(); buildLights(); });

  // A droplet on the glass
  class Drop {
    constructor(x, y, r) {
      this.x = x;
      this.y = y;
      this.r = r;
      this.vy = 0;
      this.momentum = 0;
      this.life = 1;
      // small tremble
      this.wobble = Math.random() * Math.PI * 2;
    }
  }

  let drops = [];
  const MAX_DROPS = 900;

  // Add a static cling droplet
  function addDrop(x, y, r) {
    if (drops.length >= MAX_DROPS) return;
    drops.push(new Drop(x, y, r));
  }

  // seed some ambient droplets
  function seed() {
    for (let i = 0; i < 160; i++) {
      addDrop(Math.random() * W, Math.random() * H, 1.2 + Math.random() * 3.5);
    }
  }
  seed();

  // Draw a single droplet with lens-like shading
  function drawDrop(d) {
    const r = d.r;
    if (r < 0.6) return;
    ctx.save();
    ctx.translate(d.x, d.y);

    // main body — semi transparent lens that darkens edges + bright highlight
    const g = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    g.addColorStop(0, 'rgba(230,240,255,0.28)');
    g.addColorStop(0.5, 'rgba(160,180,210,0.14)');
    g.addColorStop(0.85, 'rgba(40,55,80,0.30)');
    g.addColorStop(1, 'rgba(20,30,50,0.05)');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    // bright specular highlight (top-left)
    ctx.beginPath();
    ctx.arc(-r*0.35, -r*0.4, r*0.28, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    // subtle bottom refraction glow
    ctx.beginPath();
    ctx.arc(r*0.15, r*0.35, r*0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,220,255,0.10)';
    ctx.fill();

    ctx.restore();
  }

  // Trail streak overlay canvas for streaking effect
  const trail = document.createElement('canvas');
  const tctx = trail.getContext('2d');
  function resizeTrail() {
    trail.width = W * DPR;
    trail.height = H * DPR;
    tctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resizeTrail();
  window.addEventListener('resize', resizeTrail);

  let lastTime = performance.now();

  function update(dt) {
    // Fade trail slowly (leaves faint wet path)
    tctx.save();
    tctx.setTransform(DPR,0,0,DPR,0,0);
    tctx.globalCompositeOperation = 'source-over';
    tctx.fillStyle = 'rgba(0,0,0,0.03)';
    tctx.fillRect(0, 0, W, H);
    tctx.restore();

    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];

      // Larger drops build gravity momentum and start sliding
      const gravityThreshold = 4.2 + Math.random()*0.3;
      if (d.r > gravityThreshold) {
        d.momentum += (d.r - gravityThreshold) * 0.02;
        // occasional stick
        if (Math.random() < 0.03) d.momentum *= 0.6;
        d.vy = d.momentum;
      } else {
        d.vy *= 0.9;
      }

      if (d.vy > 0.05) {
        const prevY = d.y;
        d.y += d.vy * dt * 60 / 16;
        d.x += Math.sin(d.wobble += 0.1) * 0.3;

        // draw wet trail on the trail canvas
        tctx.beginPath();
        tctx.strokeStyle = 'rgba(180,200,230,0.10)';
        tctx.lineWidth = Math.max(1, d.r * 0.5);
        tctx.lineCap = 'round';
        tctx.moveTo(d.x, prevY);
        tctx.lineTo(d.x, d.y);
        tctx.stroke();

        // sliding drops shrink slightly (leaving residue) and can absorb others
        d.r -= 0.008 * (d.vy);
      }

      // Merge nearby drops (cheap check against a few neighbors)
      // (skipped heavy N^2; rely on spray density instead)

      // remove off-screen or tiny
      if (d.y - d.r > H || d.r < 0.5) {
        drops.splice(i, 1);
      }
    }

    // Ambient random new small drops
    if (drops.length < MAX_DROPS && Math.random() < 0.5) {
      addDrop(Math.random() * W, Math.random() * H * 0.6, 0.8 + Math.random() * 2);
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    // draw trail (streaks) beneath
    ctx.drawImage(trail, 0, 0, W, H);
    // draw drops
    for (let i = 0; i < drops.length; i++) drawDrop(drops[i]);
  }

  function loop(now) {
    const dt = Math.min(50, now - lastTime);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- Spray interaction ----------
  let spraying = false;

  function spray(x, y) {
    const count = 10 + (Math.random() * 8 | 0);
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const dist = Math.random() * 34;
      const px = x + Math.cos(ang) * dist;
      const py = y + Math.sin(ang) * dist;
      const r = 1 + Math.random() * 5.5;
      addDrop(px, py, r);
    }
    // a couple of big blobs
    for (let i = 0; i < 2; i++) {
      addDrop(x + (Math.random()-0.5)*20, y + (Math.random()-0.5)*20, 5 + Math.random()*4);
    }
  }

  function pos(e) {
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  canvas.addEventListener('mousedown', e => { spraying = true; const p = pos(e); spray(p.x, p.y); });
  window.addEventListener('mouseup', () => spraying = false);
  window.addEventListener('mousemove', e => { if (spraying) { const p = pos(e); spray(p.x, p.y); } });

  canvas.addEventListener('touchstart', e => { e.preventDefault(); spraying = true; const p = pos(e); spray(p.x, p.y); }, {passive:false});
  window.addEventListener('touchend', () => spraying = false);
  window.addEventListener('touchmove', e => { if (spraying) { e.preventDefault(); const p = pos(e); spray(p.x, p.y); } }, {passive:false});

})();
</script>
</body>
</html>
