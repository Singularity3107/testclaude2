<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rainy Window</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050510; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    const droplets = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function createDroplet(x, y) {
        droplets.push({
            x: x,
            y: y,
            size: Math.random() * 2 + 1,
            speed: Math.random() * 2 + 1,
            opacity: Math.random() * 0.5 + 0.3
        });
    }

    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, '#0a0a20');
        grad.addColorStop(1, '#1a1a3a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        // Bokeh lights
        ctx.fillStyle = 'rgba(100, 150, 255, 0.15)';
        for(let i = 0; i < 20; i++) {
            ctx.beginPath();
            ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 50 + 20, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function animate() {
        drawBackground();
        
        // Draw Glass Effect (Subtle overlay)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        for (let i = droplets.length - 1; i >= 0; i--) {
            let d = droplets[i];
            ctx.beginPath();
            ctx.ellipse(d.x, d.y, d.size * 0.5, d.size, 0, 0, Math.PI * 2);
            ctx.fill();
            
            d.y += d.speed;
            if (d.y > height) droplets.splice(i, 1);
        }

        // Random rain
        if (Math.random() > 0.8) createDroplet(Math.random() * width, -10);
        
        requestAnimationFrame(animate);
    }

    canvas.addEventListener('mousedown', (e) => {
        for(let i = 0; i < 5; i++) {
            createDroplet(e.clientX + (Math.random() * 20 - 10), e.clientY + (Math.random() * 20 - 10));
        }
    });

    animate();
</script>
</body>
</html>
